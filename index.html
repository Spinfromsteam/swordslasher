<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Slash em</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; }
        #ui { position: absolute; top: 15px; left: 15px; color: white; z-index: 100; font-family: -apple-system, sans-serif; pointer-events: none; width: calc(100% - 30px); display: flex; justify-content: space-between; }
        #timer { font-size: 1.8rem; font-weight: 800; }
        #score { font-size: 1.2rem; color: #00ffcc; }
        #lives { font-size: 1.5rem; color: #ff4444; letter-spacing: 2px; }
        #powerup-ui { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); color: #FFD700; font-weight: bold; font-size: 1.2rem; display: none; z-index: 100; text-shadow: 0 0 10px #000; }
        
        .overlay-fx { position: fixed; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; z-index: 50; pointer-events: none; }
        #flash-white { background: white; }
        #flash-red { background: red; }
        #flash-green { background: #00ff00; }
        #tint-orange { background: orange; transition: opacity 0.5s; }

        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000; color: white; text-align: left; padding: 30px;
            box-sizing: border-box;
        }
        h1 { color: #00ffff; font-size: 3rem; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 3px; }
        .desc-table { margin: 20px 0; font-size: 0.9rem; line-height: 1.4; }
        .desc-item { margin-bottom: 10px; display: flex; align-items: center; }
        .icon { width: 20px; height: 20px; margin-right: 15px; border-radius: 4px; flex-shrink: 0; }
        button { padding: 18px 50px; font-size: 1.4rem; border-radius: 40px; border: none; background: #00ffff; color: black; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="flash-white" class="overlay-fx"></div>
<div id="flash-red" class="overlay-fx"></div>
<div id="flash-green" class="overlay-fx"></div>
<div id="tint-orange" class="overlay-fx"></div>
<div id="powerup-ui">RADIANT IMMUNITY!</div>

<div id="start-overlay">
    <h1>Slash em</h1>
    <div class="desc-table">
        <div class="desc-item"><div class="icon" style="background: #00ffff;"></div><span><b>Cyan Shape:</b> +10 Pts. Miss: -5 Pts.</span></div>
        <div class="desc-item"><div class="icon" style="background: #ff0000; clip-path: polygon(50% 0%, 0% 100%, 100% 100%);"></div><span><b>Red Pyramid:</b> Bomb! -1 Heart.</span></div>
        <div class="desc-item"><div class="icon" style="background: #00ff00;"></div><span><b>Green Cube:</b> Ultra Rare Heal.</span></div>
        <div class="desc-item"><div class="icon" style="background: #FFD700; border-radius: 50%;"></div><span><b>Gold Star:</b> Legendary Immunity.</span></div>
    </div>
    <button id="start-btn">PLAY NOW</button>
</div>

<div id="ui">
    <div><div id="timer">60</div><div id="score">0</div></div>
    <div id="lives">❤❤❤</div>
</div>

<video id="input_video" playsinline style="display:none;"></video>

<script>
    let score = 0, timeLeft = 60, lives = 3, gameActive = false;
    let bombChance = 0.1, isRadiant = false;
    const targets = [];
    const trailPoints = [];
    const MAX_TRAIL_POINTS = 12;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    scene.add(new THREE.HemisphereLight(0xffffff, 0x000000, 1.2));

    // --- FIXED SWORD ORIENTATION ---
    const swordGroup = new THREE.Group();
    const bladeMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x00ffff, emissiveIntensity: 2.5 });
    
    // Blade: Start at y=0 and extend up to 1.3
    const bladeGeo = new THREE.BoxGeometry(0.08, 1.3, 0.04);
    bladeGeo.translate(0, 0.65, 0); 
    const blade = new THREE.Mesh(bladeGeo, bladeMat);
    
    // Guard: Horizontal bar at the base
    const guard = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.06, 0.1), new THREE.MeshStandardMaterial({color: 0xFFD700}));
    
    // Handle: Small cylinder below the guard
    const handle = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.2), new THREE.MeshStandardMaterial({color: 0x442200}));
    handle.position.y = -0.1;

    swordGroup.add(blade);
    swordGroup.add(guard);
    swordGroup.add(handle);
    scene.add(swordGroup);

    const trailMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.4, side: THREE.DoubleSide });
    const trailMesh = new THREE.Mesh(new THREE.PlaneGeometry(1, 1, 1, MAX_TRAIL_POINTS - 1), trailMat);
    trailMesh.frustumCulled = false;
    scene.add(trailMesh);
    camera.position.z = 5;

    function triggerEffect(id, duration = 100, maxOpacity = 0.3) {
        const el = document.getElementById(id);
        el.style.opacity = maxOpacity;
        setTimeout(() => { el.style.opacity = '0'; }, duration);
    }

    function activateRadiant() {
        isRadiant = true;
        bladeMat.emissive.setHex(0xFFD700);
        trailMat.color.setHex(0xFFD700);
        document.getElementById('powerup-ui').style.display = 'block';
        setTimeout(() => {
            isRadiant = false;
            bladeMat.emissive.setHex(0x00ffff);
            trailMat.color.setHex(0x00ffff);
            document.getElementById('powerup-ui').style.display = 'none';
        }, 5000);
    }

    const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
    hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.5 });
    
    hands.onResults((results) => {
        if (!gameActive || !results.multiHandLandmarks?.length) return;
        const hand = results.multiHandLandmarks[0];
        const indexTip = hand[8];   // Pointer tip
        const indexBase = hand[5];  // Knuckle
        const wrist = hand[0];

        // Position tracking
        const x = (indexTip.x - 0.5) * -8;
        const y = (indexTip.y - 0.5) * -6;
        swordGroup.position.lerp(new THREE.Vector3(x, y, 0), 0.4);

        // Rotation Fix: Calculate angle between wrist and index finger base
        // Adding Math.PI/2 to ensure the blade points AWAY from the wrist
        const angle = Math.atan2(indexTip.x - wrist.x, indexTip.y - wrist.y) + Math.PI;
        swordGroup.rotation.z = angle;

        // Trail updates
        const tipPos = new THREE.Vector3(0, 1.3, 0); // Local tip position
        tipPos.applyMatrix4(blade.matrixWorld);
        trailPoints.unshift(tipPos.clone());
        if (trailPoints.length > MAX_TRAIL_POINTS) trailPoints.pop();
        updateTrail();
        checkCollisions(tipPos);
    });

    function updateTrail() {
        if (trailPoints.length < 2) return;
        const positions = trailMesh.geometry.attributes.position.array;
        for (let i = 0; i < trailPoints.length; i++) {
            positions[i * 6] = trailPoints[i].x - 0.08; positions[i * 6 + 1] = trailPoints[i].y; positions[i * 6 + 2] = trailPoints[i].z;
            positions[i * 6 + 3] = trailPoints[i].x + 0.08; positions[i * 6 + 4] = trailPoints[i].y; positions[i * 6 + 5] = trailPoints[i].z;
        }
        trailMesh.geometry.attributes.position.needsUpdate = true;
    }

    function checkCollisions(tipPos) {
        for (let i = targets.length - 1; i >= 0; i--) {
            const t = targets[i];
            if (tipPos.distanceTo(t.position) < 0.7) {
                if (t.userData.isRadiant) { activateRadiant(); triggerEffect('flash-white', 200, 0.5); }
                else if (t.userData.isHeal) { if (lives < 3) lives++; triggerEffect('flash-green', 200, 0.4); document.getElementById('lives').innerText = "❤".repeat(lives); }
                else if (t.userData.isBomb) { if (!isRadiant) { lives--; triggerEffect('flash-red', 150, 0.6); document.getElementById('lives').innerText = "❤".repeat(lives); if (lives <= 0) endGame("OUT OF LIVES"); } }
                else { triggerEffect('flash-white', 80, 0.3); score += 10; }
                scene.remove(t); targets.splice(i, 1);
                document.getElementById('score').innerText = score;
            }
        }
    }

    function endGame(msg) { gameActive = false; alert(`${msg}! Score: ${score}`); location.reload(); }

    const cameraControl = new Camera(document.getElementById('input_video'), {
        onFrame: async () => { if(gameActive) await hands.send({image: document.getElementById('input_video')}); },
        width: 480, height: 360
    });

    document.getElementById('start-btn').addEventListener('click', () => {
        document.getElementById('start-overlay').style.display = 'none';
        gameActive = true;
        cameraControl.start();
        spawnLoop();
        startTimer();
    });

    function spawnLoop() {
        if (!gameActive) return;
        const rand = Math.random();
        
        // --- REDUCED SPAWN RATES ---
        const isRadiantSpawn = rand < 0.015; // 1.5% chance
        const isHealSpawn = !isRadiantSpawn && rand < 0.045; // ~3% chance
        const isBombSpawn = !isRadiantSpawn && !isHealSpawn && rand < (0.05 + bombChance);
        
        let geom, mat;
        if (isRadiantSpawn) {
            geom = new THREE.SphereGeometry(0.3, 16, 16);
            mat = new THREE.MeshStandardMaterial({ color: 0xFFD700, emissive: 0xFFD700, emissiveIntensity: 2 });
        } else if (isHealSpawn) {
            geom = new THREE.BoxGeometry(0.4, 0.4, 0.4);
            mat = new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x00ff00, emissiveIntensity: 1 });
        } else if (isBombSpawn) {
            geom = new THREE.ConeGeometry(0.4, 0.7, 4);
            mat = new THREE.MeshPhongMaterial({ color: 0xff0000 });
        } else {
            geom = new THREE.IcosahedronGeometry(0.35, 1);
            mat = new THREE.MeshPhongMaterial({ color: 0x00ffff });
        }

        const mesh = new THREE.Mesh(geom, mat);
        mesh.userData = { isBomb: isBombSpawn, isRadiant: isRadiantSpawn, isHeal: isHealSpawn };
        mesh.position.set((Math.random() - 0.5) * 5, -4, 0);
        mesh.velocity = new THREE.Vector3((Math.random() - 0.5) * 0.03, 0.16, 0);
        scene.add(mesh);
        targets.push(mesh);
        
        setTimeout(spawnLoop, Math.max(400, 700 - (60 - timeLeft) * 6));
    }

    function startTimer() {
        const ticker = setInterval(() => {
            if (!gameActive) { clearInterval(ticker); return; }
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            bombChance = Math.min(0.5, 0.1 + (60 - timeLeft) * 0.01);
            if (timeLeft <= 0) { endGame("TIME UP"); clearInterval(ticker); }
        }, 1000);
    }

    function animate() {
        requestAnimationFrame(animate);
        for (let i = targets.length - 1; i >= 0; i--) {
            const t = targets[i];
            t.position.add(t.velocity);
            t.velocity.y -= 0.0032;
            t.rotation.y += 0.06;
            if (t.position.y < -5) {
                if (!t.userData.isBomb && !t.userData.isRadiant && !t.userData.isHeal && !isRadiant) {
                    score = Math.max(0, score - 5);
                    document.getElementById('score').innerText = score;
                    triggerEffect('tint-orange', 600, 0.2);
                }
                scene.remove(t); targets.splice(i, 1);
            }
        }
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
