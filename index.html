<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sword Master: 3 Strikes</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; }
        #ui { position: absolute; top: 15px; left: 15px; color: white; z-index: 100; font-family: -apple-system, sans-serif; pointer-events: none; width: calc(100% - 30px); display: flex; justify-content: space-between; align-items: flex-start; }
        #stats { display: flex; flex-direction: column; }
        #timer { font-size: 1.8rem; font-weight: 800; }
        #score { font-size: 1.2rem; color: #00ffcc; }
        #lives { font-size: 1.5rem; color: #ff4444; text-shadow: 0 0 10px rgba(255,0,0,0.5); }
        
        #flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; z-index: 50; pointer-events: none; }
        #death-flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: red; opacity: 0; z-index: 51; pointer-events: none; }

        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000; color: white; text-align: center; padding: 20px;
        }
        button { padding: 15px 40px; font-size: 1.2rem; border-radius: 30px; border: none; background: #FFD700; color: black; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div id="flash"></div>
<div id="death-flash"></div>

<div id="start-overlay">
    <h1>Sword Master</h1>
    <p>Slice the <span style="color:#00ffcc">CYAN</span> shapes.<br>
    Hitting <span style="color:#ff4444">RED BOMBS</span> costs 1 life.<br>
    You have <b>3 LIVES</b>.</p>
    <button id="start-btn">BEGIN QUEST</button>
</div>

<div id="ui">
    <div id="stats">
        <div id="timer">60</div>
        <div id="score">Score: 0</div>
    </div>
    <div id="lives">❤❤❤</div>
</div>

<video id="input_video" playsinline style="display:none;"></video>

<script>
    let score = 0, timeLeft = 60, lives = 3, gameActive = false;
    const targets = [];
    const trailPoints = [];
    const MAX_TRAIL_POINTS = 8;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 5, 5);
    scene.add(light, new THREE.AmbientLight(0x606060));

    // --- RE-DESIGNED SWORD ---
    const swordGroup = new THREE.Group();
    
    // Blade: Silver/Steel color
    const bladeGeo = new THREE.BoxGeometry(0.08, 1.3, 0.03);
    const bladeMat = new THREE.MeshStandardMaterial({ color: 0xdcdcdc, metalness: 0.8, roughness: 0.2 });
    const blade = new THREE.Mesh(bladeGeo, bladeMat);
    blade.position.y = 0.75; 
    swordGroup.add(blade);

    // Crossguard (The horizontal part)
    const guardGeo = new THREE.BoxGeometry(0.4, 0.05, 0.1);
    const goldMat = new THREE.MeshStandardMaterial({ color: 0xFFD700, metalness: 0.9, roughness: 0.1 });
    const guard = new THREE.Mesh(guardGeo, goldMat);
    guard.position.y = 0.1;
    swordGroup.add(guard);

    // Handle/Hilt
    const handleGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.3);
    const handleMat = new THREE.MeshStandardMaterial({ color: 0x331a00 });
    const handle = new THREE.Mesh(handleGeo, handleMat);
    handle.position.y = -0.05;
    swordGroup.add(handle);

    scene.add(swordGroup);

    // Trail (White/Silver)
    const trailGeo = new THREE.PlaneGeometry(1, 1, 1, MAX_TRAIL_POINTS - 1);
    const trailMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.25, side: THREE.DoubleSide });
    const trailMesh = new THREE.Mesh(trailGeo, trailMat);
    trailMesh.frustumCulled = false;
    scene.add(trailMesh);

    camera.position.z = 5;

    function triggerFlash(color = 'white') {
        const el = color === 'white' ? document.getElementById('flash') : document.getElementById('death-flash');
        el.style.opacity = '0.7';
        setTimeout(() => { el.style.opacity = '0'; }, 80);
    }

    const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
    hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.5 });
    
    hands.onResults((results) => {
        if (!gameActive) return;
        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            const hand = results.multiHandLandmarks[0];
            const tip = hand[8];
            const wrist = hand[0];

            const x = (tip.x - 0.5) * -8;
            const y = (tip.y - 0.5) * -6;
            
            swordGroup.position.lerp(new THREE.Vector3(x, y, 0), 0.4);
            swordGroup.rotation.z = Math.atan2(tip.x - wrist.x, tip.y - wrist.y);

            const currentTip = new THREE.Vector3();
            blade.getWorldPosition(currentTip);
            trailPoints.unshift(currentTip.clone());
            if (trailPoints.length > MAX_TRAIL_POINTS) trailPoints.pop();

            updateTrail();
            checkCollisions(currentTip);
        }
    });

    function updateTrail() {
        if (trailPoints.length < 2) return;
        const positions = trailMesh.geometry.attributes.position.array;
        for (let i = 0; i < trailPoints.length; i++) {
            positions[i * 6] = trailPoints[i].x - 0.04;
            positions[i * 6 + 1] = trailPoints[i].y;
            positions[i * 6 + 2] = trailPoints[i].z;
            positions[i * 6 + 3] = trailPoints[i].x + 0.04;
            positions[i * 6 + 4] = trailPoints[i].y;
            positions[i * 6 + 5] = trailPoints[i].z;
        }
        trailMesh.geometry.attributes.position.needsUpdate = true;
    }

    function checkCollisions(tipPos) {
        for (let i = targets.length - 1; i >= 0; i--) {
            const t = targets[i];
            if (tipPos.distanceTo(t.position) < 0.6) {
                if (t.userData.isBomb) {
                    loseLife(i);
                } else {
                    triggerFlash('white');
                    scene.remove(t);
                    targets.splice(i, 1);
                    score += 10;
                    document.getElementById('score').innerText = `Score: ${score}`;
                }
            }
        }
    }

    function loseLife(index) {
        lives--;
        triggerFlash('red');
        scene.remove(targets[index]);
        targets.splice(index, 1);
        
        document.getElementById('lives').innerText = "❤".repeat(lives);
        
        if (lives <= 0) {
            gameActive = false;
            setTimeout(() => {
                alert(`NO LIVES LEFT!\nFinal Score: ${score}`);
                location.reload();
            }, 200);
        }
    }

    const cameraControl = new Camera(document.getElementById('input_video'), {
        onFrame: async () => { if(gameActive) await hands.send({image: document.getElementById('input_video')}); },
        width: 480, height: 360
    });

    document.getElementById('start-btn').addEventListener('click', () => {
        document.getElementById('start-overlay').style.display = 'none';
        gameActive = true;
        cameraControl.start();
        spawnLoop();
        startTimer();
    });

    function spawnLoop() {
        if (!gameActive) return;
        
        // Bomb probability reduced to ~12%
        const isBomb = Math.random() > 0.88; 
        let geom, mat;

        if (isBomb) {
            geom = new THREE.SphereGeometry(0.35, 6, 6); // Jagged bomb shape
            mat = new THREE.MeshPhongMaterial({ color: 0xff0000, emissive: 0x550000 });
        } else {
            geom = new THREE.IcosahedronGeometry(0.35, 1);
            mat = new THREE.MeshPhongMaterial({ color: 0x00ccff, emissive: 0x003344 });
        }

        const mesh = new THREE.Mesh(geom, mat);
        mesh.userData.isBomb = isBomb;
        mesh.position.set((Math.random() - 0.5) * 5, -4, 0);
        mesh.velocity = new THREE.Vector3((Math.random() - 0.5) * 0.03, 0.12 + (Math.random() * 0.04), 0);
        
        scene.add(mesh);
        targets.push(mesh);
        
        setTimeout(spawnLoop, 850);
    }

    function startTimer() {
        const ticker = setInterval(() => {
            if (!gameActive) { clearInterval(ticker); return; }
            if (--timeLeft <= 0) {
                gameActive = false;
                alert("TIME UP! Score: " + score);
                location.reload();
                clearInterval(ticker);
            }
            document.getElementById('timer').innerText = timeLeft;
        }, 1000);
    }

    function animate() {
        requestAnimationFrame(animate);
        targets.forEach((t, i) => {
            t.position.add(t.velocity);
            t.velocity.y -= 0.002;
            t.rotation.x += 0.04;
            if (t.position.y < -5) {
                scene.remove(t);
                targets.splice(i, 1);
            }
        });
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
