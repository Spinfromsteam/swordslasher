<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sword Master: Radiant</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; }
        #ui { position: absolute; top: 15px; left: 15px; color: white; z-index: 100; font-family: -apple-system, sans-serif; pointer-events: none; width: calc(100% - 30px); display: flex; justify-content: space-between; }
        #timer { font-size: 1.8rem; font-weight: 800; }
        #score { font-size: 1.2rem; color: #00ffcc; }
        #lives { font-size: 1.5rem; color: #ff4444; }
        #powerup-ui { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: #FFD700; font-weight: bold; font-size: 1.2rem; display: none; z-index: 100; }
        
        .overlay-fx { position: fixed; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; z-index: 50; pointer-events: none; }
        #flash-white { background: white; }
        #flash-red { background: red; }
        #tint-orange { background: orange; transition: opacity 0.5s; }

        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000; color: white; text-align: center; padding: 20px;
        }
        button { padding: 15px 40px; font-size: 1.2rem; border-radius: 30px; border: none; background: #FFD700; color: black; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div id="flash-white" class="overlay-fx"></div>
<div id="flash-red" class="overlay-fx"></div>
<div id="tint-orange" class="overlay-fx"></div>
<div id="powerup-ui">RADIANT IMMUNITY!</div>

<div id="start-overlay">
    <h1>Sword Master</h1>
    <p>Slice <span style="color:#FFD700">GOLDEN STARS</span> for 5s Immunity!</p>
    <button id="start-btn">START</button>
</div>

<div id="ui">
    <div>
        <div id="timer">60</div>
        <div id="score">0</div>
    </div>
    <div id="lives">❤❤❤</div>
</div>

<video id="input_video" playsinline style="display:none;"></video>

<script>
    let score = 0, timeLeft = 60, lives = 3, gameActive = false;
    let bombChance = 0.1, isRadiant = false;
    const targets = [];
    const trailPoints = [];
    const MAX_TRAIL_POINTS = 10;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    scene.add(new THREE.HemisphereLight(0xffffff, 0x000000, 1.2));

    // --- SWORD ---
    const swordGroup = new THREE.Group();
    const bladeMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x00ffff, emissiveIntensity: 2.5 });
    const blade = new THREE.Mesh(new THREE.BoxGeometry(0.1, 1.3, 0.05), bladeMat);
    blade.position.y = 0.75; 
    swordGroup.add(blade);
    swordGroup.add(new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.06, 0.1), new THREE.MeshStandardMaterial({color: 0xFFD700})));
    scene.add(swordGroup);

    const trailMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.4, side: THREE.DoubleSide });
    const trailMesh = new THREE.Mesh(new THREE.PlaneGeometry(1, 1, 1, MAX_TRAIL_POINTS - 1), trailMat);
    trailMesh.frustumCulled = false;
    scene.add(trailMesh);

    camera.position.z = 5;

    function triggerEffect(id, duration = 100, maxOpacity = 0.6) {
        const el = document.getElementById(id);
        el.style.opacity = maxOpacity;
        setTimeout(() => { el.style.opacity = '0'; }, duration);
    }

    function activateRadiant() {
        isRadiant = true;
        bladeMat.emissive.setHex(0xFFD700);
        trailMat.color.setHex(0xFFD700);
        document.getElementById('powerup-ui').style.display = 'block';
        
        setTimeout(() => {
            isRadiant = false;
            bladeMat.emissive.setHex(0x00ffff);
            trailMat.color.setHex(0x00ffff);
            document.getElementById('powerup-ui').style.display = 'none';
        }, 5000);
    }

    const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
    hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.5 });
    
    hands.onResults((results) => {
        if (!gameActive || !results.multiHandLandmarks?.length) return;
        const hand = results.multiHandLandmarks[0];
        const tip = hand[8], wrist = hand[0];
        const x = (tip.x - 0.5) * -8, y = (tip.y - 0.5) * -6;
        swordGroup.position.lerp(new THREE.Vector3(x, y, 0), 0.4);
        swordGroup.rotation.z = Math.atan2(tip.x - wrist.x, tip.y - wrist.y);
        const currentTip = new THREE.Vector3();
        blade.getWorldPosition(currentTip);
        trailPoints.unshift(currentTip.clone());
        if (trailPoints.length > MAX_TRAIL_POINTS) trailPoints.pop();
        updateTrail();
        checkCollisions(currentTip);
    });

    function updateTrail() {
        if (trailPoints.length < 2) return;
        const positions = trailMesh.geometry.attributes.position.array;
        for (let i = 0; i < trailPoints.length; i++) {
            positions[i * 6] = trailPoints[i].x - 0.1; positions[i * 6 + 1] = trailPoints[i].y; positions[i * 6 + 2] = trailPoints[i].z;
            positions[i * 6 + 3] = trailPoints[i].x + 0.1; positions[i * 6 + 4] = trailPoints[i].y; positions[i * 6 + 5] = trailPoints[i].z;
        }
        trailMesh.geometry.attributes.position.needsUpdate = true;
    }

    function checkCollisions(tipPos) {
        for (let i = targets.length - 1; i >= 0; i--) {
            const t = targets[i];
            if (tipPos.distanceTo(t.position) < 0.7) {
                if (t.userData.isPowerup) {
                    activateRadiant();
                    triggerEffect('flash-white', 200, 0.8);
                } else if (t.userData.isBomb) {
                    if (!isRadiant) {
                        lives--;
                        triggerEffect('flash-red', 150, 0.7);
                        document.getElementById('lives').innerText = "❤".repeat(lives);
                        if (lives <= 0) endGame("OUT OF LIVES");
                    }
                } else {
                    triggerEffect('flash-white', 80, 0.5);
                    score += 10;
                }
                scene.remove(t); targets.splice(i, 1);
                document.getElementById('score').innerText = score;
            }
        }
    }

    function endGame(msg) { gameActive = false; alert(`${msg}! Score: ${score}`); location.reload(); }

    const cameraControl = new Camera(document.getElementById('input_video'), {
        onFrame: async () => { if(gameActive) await hands.send({image: document.getElementById('input_video')}); },
        width: 480, height: 360
    });

    document.getElementById('start-btn').addEventListener('click', () => {
        document.getElementById('start-overlay').style.display = 'none';
        gameActive = true;
        cameraControl.start();
        spawnLoop();
        startTimer();
    });

    function spawnLoop() {
        if (!gameActive) return;
        const rand = Math.random();
        const isPowerup = rand < 0.05; // 5% chance
        const isBomb = !isPowerup && rand < (0.05 + bombChance);
        
        let geom, mat;
        if (isPowerup) {
            geom = new THREE.SphereGeometry(0.3, 16, 16);
            mat = new THREE.MeshStandardMaterial({ color: 0xFFD700, emissive: 0xFFD700, emissiveIntensity: 2 });
        } else if (isBomb) {
            geom = new THREE.ConeGeometry(0.4, 0.7, 4);
            mat = new THREE.MeshPhongMaterial({ color: 0xff0000 });
        } else {
            geom = new THREE.IcosahedronGeometry(0.35, 1);
            mat = new THREE.MeshPhongMaterial({ color: 0x00ffff });
        }

        const mesh = new THREE.Mesh(geom, mat);
        mesh.userData = { isBomb, isPowerup };
        mesh.position.set((Math.random() - 0.5) * 5, -4, 0);
        mesh.velocity = new THREE.Vector3((Math.random() - 0.5) * 0.03, 0.14, 0);
        scene.add(mesh);
        targets.push(mesh);
        
        // Slightly faster base spawning
        const interval = Math.max(500, 800 - (60 - timeLeft) * 6);
        setTimeout(spawnLoop, interval);
    }

    function startTimer() {
        const ticker = setInterval(() => {
            if (!gameActive) { clearInterval(ticker); return; }
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            bombChance = Math.min(0.5, 0.1 + (60 - timeLeft) * 0.008);
            if (timeLeft <= 0) { endGame("TIME UP"); clearInterval(ticker); }
        }, 1000);
    }

    function animate() {
        requestAnimationFrame(animate);
        for (let i = targets.length - 1; i >= 0; i--) {
            const t = targets[i];
            t.position.add(t.velocity);
            t.velocity.y -= 0.0028;
            t.rotation.y += 0.06;
            if (t.position.y < -5) {
                if (!t.userData.isBomb && !t.userData.isPowerup && !isRadiant) {
                    score = Math.max(0, score - 5);
                    document.getElementById('score').innerText = score;
                    triggerEffect('tint-orange', 800, 0.3); // More transparent orange tint
                }
                scene.remove(t); targets.splice(i, 1);
            }
        }
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
