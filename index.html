<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SE Sword Master Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; }
        #ui { position: absolute; top: 15px; left: 15px; color: white; z-index: 100; font-family: -apple-system, sans-serif; pointer-events: none; }
        #timer { font-size: 1.8rem; font-weight: 800; }
        #score { font-size: 1.2rem; color: #00ffcc; }
        
        /* Flash Effect Overlay */
        #flash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; z-index: 50; pointer-events: none;
        }

        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000; color: white;
        }
        button { padding: 15px 40px; font-size: 1.2rem; border-radius: 30px; border: none; background: #00ffcc; font-weight: bold; }
    </style>
</head>
<body>

<div id="flash"></div>
<div id="start-overlay">
    <h2>Sword Master</h2>
    <button id="start-btn">TAP TO PLAY</button>
</div>

<div id="ui">
    <div id="timer">60</div>
    <div id="score">0</div>
</div>

<video id="input_video" playsinline style="display:none;"></video>

<script>
    let score = 0, timeLeft = 60, gameActive = false;
    const targets = [];
    const trailPoints = [];
    const MAX_TRAIL_POINTS = 10;

    // --- THREE.JS SETUP ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Light
    const light = new THREE.PointLight(0xffffff, 1.5);
    light.position.set(0, 5, 5);
    scene.add(light, new THREE.AmbientLight(0x404040));

    // --- SMALLER SWORD ---
    const swordGroup = new THREE.Group();
    // Reduced length to 1.2 (from 2.5) for a shorter, snappier blade
    const bladeGeo = new THREE.BoxGeometry(0.08, 1.2, 0.08);
    const bladeMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff });
    const blade = new THREE.Mesh(bladeGeo, bladeMat);
    blade.position.y = 0.6; // Adjust pivot
    swordGroup.add(blade);
    scene.add(swordGroup);

    // --- TRAIL SETUP ---
    const trailGeo = new THREE.PlaneGeometry(1, 1, 1, MAX_TRAIL_POINTS - 1);
    const trailMat = new THREE.MeshBasicMaterial({ 
        color: 0x00ffff, 
        transparent: true, 
        opacity: 0.4, 
        side: THREE.DoubleSide 
    });
    const trailMesh = new THREE.Mesh(trailGeo, trailMat);
    trailMesh.frustumCulled = false;
    scene.add(trailMesh);

    camera.position.z = 5;

    // --- FLASH FUNCTION ---
    function triggerFlash() {
        const flash = document.getElementById('flash');
        flash.style.opacity = '0.8';
        setTimeout(() => { flash.style.opacity = '0'; }, 50);
    }

    // --- HAND TRACKING ---
    const videoElement = document.getElementById('input_video');
    const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
    
    hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.5 });
    
    hands.onResults((results) => {
        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            const hand = results.multiHandLandmarks[0];
            const tip = hand[8];
            const wrist = hand[0];

            const x = (tip.x - 0.5) * -8;
            const y = (tip.y - 0.5) * -6;
            
            swordGroup.position.lerp(new THREE.Vector3(x, y, 0), 0.4);
            swordGroup.rotation.z = Math.atan2(tip.x - wrist.x, tip.y - wrist.y);

            // Trail Logic: Save the blade tip position
            const currentTip = new THREE.Vector3();
            blade.getWorldPosition(currentTip);
            trailPoints.unshift(currentTip.clone());
            if (trailPoints.length > MAX_TRAIL_POINTS) trailPoints.pop();

            updateTrail();
            checkCollisions(currentTip);
        }
    });

    function updateTrail() {
        if (trailPoints.length < 2) return;
        const positions = trailMesh.geometry.attributes.position.array;
        for (let i = 0; i < trailPoints.length; i++) {
            // We create a "ribbon" by slightly offsetting x/z for each point
            positions[i * 6] = trailPoints[i].x - 0.1;
            positions[i * 6 + 1] = trailPoints[i].y;
            positions[i * 6 + 2] = trailPoints[i].z;
            positions[i * 6 + 3] = trailPoints[i].x + 0.1;
            positions[i * 6 + 4] = trailPoints[i].y;
            positions[i * 6 + 5] = trailPoints[i].z;
        }
        trailMesh.geometry.attributes.position.needsUpdate = true;
    }

    function checkCollisions(tipPos) {
        for (let i = targets.length - 1; i >= 0; i--) {
            if (tipPos.distanceTo(targets[i].position) < 0.6) {
                triggerFlash();
                scene.remove(targets[i]);
                targets.splice(i, 1);
                score += 10;
                document.getElementById('score').innerText = score;
            }
        }
    }

    // --- CAMERA & START ---
    const cameraControl = new Camera(videoElement, {
        onFrame: async () => { if(gameActive) await hands.send({image: videoElement}); },
        width: 480, height: 360
    });

    document.getElementById('start-btn').addEventListener('click', () => {
        document.getElementById('start-overlay').style.display = 'none';
        gameActive = true;
        cameraControl.start();
        spawnLoop();
        startTimer();
    });

    function spawnLoop() {
        if (!gameActive) return;
        const mesh = new THREE.Mesh(
            new THREE.IcosahedronGeometry(0.35, 0),
            new THREE.MeshPhongMaterial({ color: 0xff3300 })
        );
        mesh.position.set((Math.random() - 0.5) * 5, -4, 0);
        mesh.velocity = new THREE.Vector3((Math.random() - 0.5) * 0.03, 0.13, 0);
        scene.add(mesh);
        targets.push(mesh);
        setTimeout(spawnLoop, 1000);
    }

    function startTimer() {
        const ticker = setInterval(() => {
            if (--timeLeft <= 0) {
                gameActive = false;
                alert("Time's up! Score: " + score);
                location.reload();
            }
            document.getElementById('timer').innerText = timeLeft;
        }, 1000);
    }

    function animate() {
        requestAnimationFrame(animate);
        targets.forEach((t, i) => {
            t.position.add(t.velocity);
            t.velocity.y -= 0.0025; // Gravity
            if (t.position.y < -5) {
                scene.remove(t);
                targets.splice(i, 1);
            }
        });
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
